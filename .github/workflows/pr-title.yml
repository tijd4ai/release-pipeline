name: Validate PR Title

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate Conventional Commit Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows conventional commit format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?(!)?: [a-z].+'
          if [[ ! "$PR_TITLE" =~ $PATTERN ]]; then
            echo "::error::PR title does not follow conventional commit format."
            echo ""
            echo "Expected: <type>(<optional scope>): <description starting with lowercase>"
            echo "Got:      $PR_TITLE"
            echo ""
            echo "Valid types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            echo ""
            echo "Examples:"
            echo "  feat: add login page"
            echo "  fix(auth): resolve token expiry bug"
            echo "  feat!: redesign user API"
            exit 1
          fi
          echo "PR title is valid: $PR_TITLE"
